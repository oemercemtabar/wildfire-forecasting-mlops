project:
  name: "wildfire-forecasting-mlops"
  region: "Italy-High-Risk-Areas"

data:
  raw_paths:
    - data/raw/italy_viirs_snpp_2023.csv
    - data/raw/italy_viirs_snpp_2024.csv
  interim_path: data/interim/fire_events_italy_viirs_snpp_2023_2024.csv
  validated_path: data/processed/validated.csv
  positive_base_path: data/processed/positive_fire_base.csv
  negative_samples_path: data/processed/negative_samples.csv
  training_dataset_path: data/processed/training_dataset.csv
  weather_enriched_path: data/processed/training_dataset_weather_enriched.csv

artifacts:
  preprocessor_path: data/artifacts/preprocessor.joblib
  model_path: data/artifacts/model.joblib
  metrics_path: data/artifacts/metrics.json
  validation_report_path: data/artifacts/validation_report.json
  X_train_path: data/artifacts/X_train.csv
  X_test_path: data/artifacts/X_test.csv
  y_train_path: data/artifacts/y_train.csv
  y_test_path: data/artifacts/y_test.csv
  weather_cache_dir: data/artifacts/weather_cache
  weather_summary_path: data/artifacts/weather_enrichment_summary.json
  failed_weather_requests_path: data/artifacts/failed_weather_requests.csv

target:
  column: fire_occurred

features:
  numeric:
    - latitude
    - longitude
    - bright_ti4
    - bright_ti5
    - frp
    - scan
    - track
  categorical:
    - satellite
    - instrument
    - confidence
    - daynight
    - type
    - version
  datetime:
    - acq_date
    - acq_time